# Legacy Jekyll templates are archived under /legacy/jekyll and excluded from build.

title: GERDSEN AI - From Metal to Model
email: garrett@gerdsen.ai
description: >- 
  GERDSEN AI engineers full-stack AI systems from metal to model, including desktop apps,
  agents, RAG and vector databases, model training, computer vision, robotics, and edge deployment.
baseurl: "" 
url: "https://gerdsen.ai"
twitter_username: 
github_username: GerdsenAI-Admin

# Build settings
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude files from build
exclude:
  - .temp
  - README.md
  - DEPLOYMENT_GUIDE.md
  - deploy.sh
  - JEKYLL_SETUP.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - assets/images/originals
  - assets/images/unused
  - assets/images/proof/recomputer-zed.jpeg
  - assets/images/proof/vector-db-diagram.png
  - legacy

# Custom variables
company:
  founded: 2025
  location: "United States"
